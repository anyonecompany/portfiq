[mypy]
python_version = 3.11
ignore_missing_imports = True
warn_return_any = False
warn_unused_configs = True
check_untyped_defs = True

# Supabase SDK returns complex JSON union types that are not narrowable
# These modules heavily use resp.data which is typed as JSON | None
[mypy-services.admin_service]
disable_error_code = union-attr, index, call-overload, arg-type, operator, assignment, attr-defined

[mypy-routers.admin]
disable_error_code = union-attr, index, call-overload, arg-type, operator, attr-defined

[mypy-services.etf_analysis_service]
disable_error_code = union-attr, index, call-overload, arg-type, operator, return-value, assignment

[mypy-jobs.aggregation]
disable_error_code = union-attr, index, call-overload, arg-type, operator

[mypy-jobs.funnel_aggregation]
disable_error_code = union-attr, index, call-overload, misc

[mypy-main]
disable_error_code = arg-type
